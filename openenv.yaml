name: fortis-l7-env
version: 1.0.0
description: Benchmark environment for L7 API traffic mitigation and bot defense

entrypoint:
  module: env
  class: FortisL7Env

observation_space:
  type: vector
  shape: [5]
  dtype: float32
  description: Normalized 5D traffic fingerprint

action_space:
  type: discrete
  n: 4
  description: 0=Allow, 1=Throttle, 2=Challenge, 3=Block

tasks:
  - id: static_scraper_defense
    description: Detect and mitigate simple static scraper bots
    difficulty: easy
    max_steps: 50

  - id: distributed_bot_defense
    description: Maintain low false positives during distributed bot attack
    difficulty: medium
    max_steps: 75

  - id: llm_mimicry_detection
    description: Identify sophisticated LLM-like bots without causing CPU overload
    difficulty: hard
    max_steps: 100